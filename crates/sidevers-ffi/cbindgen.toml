language = "C"
header = """
/*
 * sidevers.h — C bindings for the Sidevers protocol's core operations.
 *
 * Auto-generated by cbindgen; do not edit by hand.
 *
 * Memory ownership: any function that returns a heap-allocated buffer or
 * string transfers ownership to the caller. Release with the matching
 * sv_free_buffer / sv_free_string call. Buffers passed *in* are borrowed
 * and never freed by the FFI.
 *
 * Error reporting: functions return SvStatusOk (0) on success or a negative
 * status code on failure. After a failure, sv_last_error_message() may
 * return a heap-allocated UTF-8 string describing the cause (free with
 * sv_free_string).
 */
"""
include_guard = "SIDEVERS_H"
autogen_warning = "/* WARNING: this file is auto-generated by cbindgen. Do not edit. */"
include_version = false
no_includes = false
sys_includes = ["stdint.h", "stddef.h"]
cpp_compat = true
line_length = 88
tab_width = 4
style = "type"

[parse]
parse_deps = false

[enum]
prefix_with_name = true
