<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" width="1200" height="1600">
  <!-- Sidevers Brand Colors — Visual Swatch Sheet -->
  <rect width="1200" height="1600" fill="#FFFFFF"/>

  <text x="80" y="120" font-family="Inter, Helvetica, Arial, sans-serif" font-size="56" font-weight="700" fill="#1D1D1F">Sidevers Brand Colors</text>
  <text x="80" y="170" font-family="Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#86868B">Six grays. Nothing else.</text>

  <rect x="80" y="240" width="240" height="240" fill="#FFFFFF" stroke="#D2D2D7" stroke-width="1"/>
  <text x="350" y="280" font-family="Inter, Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#1D1D1F">Snow</text>
  <text x="350" y="320" font-family="monospace" font-size="22" font-weight="400" fill="#86868B">#FFFFFF</text>
  <text x="350" y="360" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#86868B">Pure light</text>

  <rect x="80" y="510" width="240" height="240" fill="#F5F5F7"/>
  <text x="350" y="550" font-family="Inter, Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#1D1D1F">Mist</text>
  <text x="350" y="590" font-family="monospace" font-size="22" font-weight="400" fill="#86868B">#F5F5F7</text>
  <text x="350" y="630" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#86868B">Soft surface — backgrounds, subtle separators</text>

  <rect x="80" y="780" width="240" height="240" fill="#D2D2D7"/>
  <text x="350" y="820" font-family="Inter, Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#1D1D1F">Silver Light</text>
  <text x="350" y="860" font-family="monospace" font-size="22" font-weight="400" fill="#86868B">#D2D2D7</text>
  <text x="350" y="900" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#86868B">Border, divider, muted UI</text>

  <rect x="80" y="1050" width="240" height="240" fill="#86868B"/>
  <text x="350" y="1090" font-family="Inter, Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#1D1D1F">Silver</text>
  <text x="350" y="1130" font-family="monospace" font-size="22" font-weight="400" fill="#86868B">#86868B</text>
  <text x="350" y="1170" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#86868B">Secondary text, captions</text>

  <rect x="640" y="240" width="240" height="240" fill="#1D1D1F"/>
  <text x="910" y="280" font-family="Inter, Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#1D1D1F">Ink</text>
  <text x="910" y="320" font-family="monospace" font-size="22" font-weight="400" fill="#86868B">#1D1D1F</text>
  <text x="910" y="360" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#86868B">Primary text, headlines</text>
  <text x="910" y="395" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#1D1D1F">The foreground of the brand</text>

  <rect x="640" y="510" width="240" height="240" fill="#000000"/>
  <text x="910" y="550" font-family="Inter, Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#1D1D1F">Onyx</text>
  <text x="910" y="590" font-family="monospace" font-size="22" font-weight="400" fill="#86868B">#000000</text>
  <text x="910" y="630" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#86868B">Pure dark</text>
  <text x="910" y="665" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#86868B">Reserved for high contrast</text>

  <text x="80" y="1420" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" fill="#86868B">Color discipline is the point. Silver carries authority without shouting;</text>
  <text x="80" y="1445" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" fill="#86868B">ink reads on white; pearl gives surfaces somewhere to live. Nothing loud in between.</text>
</svg>
