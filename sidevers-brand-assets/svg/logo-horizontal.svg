<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <!--
    Sidevers Logo — Horizontal Lockup
    Mark on the left at cap-height of the wordmark (with clearance).
    "sidevers" lowercase in Geist Medium, tracking -0.05em.
    Matches the lockup shown in Sidevers Project Document v.2 §7.5.
  -->

  <defs>
    <linearGradient id="ms" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#C5C5CA"/>
      <stop offset="50%" stop-color="#86868B"/>
      <stop offset="100%" stop-color="#5A5A5F"/>
    </linearGradient>
    <linearGradient id="mr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#A8A8AD"/>
      <stop offset="50%" stop-color="#6E6E73"/>
      <stop offset="100%" stop-color="#3A3A3C"/>
    </linearGradient>
    <g id="inf-lockup">
      <ellipse cx="60" cy="80" rx="27" ry="19"
               fill="none" stroke="url(#ms)" stroke-width="4.5"
               stroke-linecap="round"/>
      <ellipse cx="100" cy="80" rx="27" ry="19"
               fill="none" stroke="url(#ms)" stroke-width="4.5"
               stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Mark (hero style, 160×160 black rounded square, centered mark inside) -->
  <rect x="20" y="20" width="160" height="160" rx="32" ry="32" fill="#000000"/>
  <!-- Group all mark contents and translate so they center at (100,100) -->
  <g transform="translate(100 100)">
    <circle cx="0" cy="0" r="54" fill="none" stroke="url(#mr)" stroke-width="3.5"/>
    <g transform="rotate(-45)">
      <ellipse cx="-20" cy="0" rx="27" ry="19" fill="none" stroke="url(#ms)" stroke-width="4.5" stroke-linecap="round"/>
      <ellipse cx="20" cy="0" rx="27" ry="19" fill="none" stroke="url(#ms)" stroke-width="4.5" stroke-linecap="round"/>
    </g>
    <g transform="rotate(45)">
      <ellipse cx="-20" cy="0" rx="27" ry="19" fill="none" stroke="url(#ms)" stroke-width="4.5" stroke-linecap="round"/>
      <ellipse cx="20" cy="0" rx="27" ry="19" fill="none" stroke="url(#ms)" stroke-width="4.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Wordmark to the right -->
  <text x="220" y="135"
        font-family="Geist, 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="110"
        font-weight="500"
        letter-spacing="-5.5"
        fill="#1D1D1F">sidevers</text>
</svg>
