name: release

# Two parallel jobs per OS:
#   * `cli`     — sidevers CLI + sidevers-node + libsidevers (all OSes; macOS universal)
#   * `desktop` — Tauri GUI bundle, signed + latest.json, via tauri-apps/tauri-action
#
# On tag push, both jobs upload into a single draft GitHub Release. The
# updater plugin in the desktop client (plugins.updater in tauri.conf.json)
# reads latest.json from the "latest" release tag.

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────
  # CLI / node / FFI binaries
  # ────────────────────────────────────────────────────────────────────
  cli:
    name: cli (${{ matrix.platform.label }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: ubuntu-22.04,     label: 'linux-x64',       target: 'x86_64-unknown-linux-gnu' }
          - { os: ubuntu-22.04-arm, label: 'linux-arm64',     target: 'aarch64-unknown-linux-gnu' }
          - { os: windows-latest,   label: 'windows-x64',     target: 'x86_64-pc-windows-msvc'   }
          - { os: macos-latest,     label: 'macos-universal', target: 'universal-apple-darwin'   }

    runs-on: ${{ matrix.platform.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target (Linux/Windows)
        if: matrix.platform.os != 'macos-latest'
        run: rustup target add ${{ matrix.platform.target }}

      - name: Install Rust targets (macOS universal)
        if: matrix.platform.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build CLI + node (host)
        if: matrix.platform.os != 'macos-latest'
        run: cargo build --release -p sidevers-cli -p sidevers-node -p sidevers-ffi --target ${{ matrix.platform.target }}

      - name: Build CLI + node (macOS universal via lipo)
        if: matrix.platform.os == 'macos-latest'
        run: |
          cargo build --release -p sidevers-cli -p sidevers-node -p sidevers-ffi --target aarch64-apple-darwin
          cargo build --release -p sidevers-cli -p sidevers-node -p sidevers-ffi --target x86_64-apple-darwin
          mkdir -p target/${{ matrix.platform.target }}/release
          for bin in sidevers sidevers-node; do
            lipo -create \
              target/aarch64-apple-darwin/release/$bin \
              target/x86_64-apple-darwin/release/$bin \
              -output target/${{ matrix.platform.target }}/release/$bin
          done
          for lib in libsidevers.dylib libsidevers.a; do
            lipo -create \
              target/aarch64-apple-darwin/release/$lib \
              target/x86_64-apple-darwin/release/$lib \
              -output target/${{ matrix.platform.target }}/release/$lib
          done

      - name: Stage CLI artefacts (Unix)
        if: matrix.platform.os != 'windows-latest'
        shell: bash
        run: |
          OUT="staging/${{ matrix.platform.label }}"
          mkdir -p "$OUT/bin" "$OUT/lib"
          cp target/${{ matrix.platform.target }}/release/sidevers       "$OUT/bin/"
          cp target/${{ matrix.platform.target }}/release/sidevers-node  "$OUT/bin/"
          cp crates/sidevers-ffi/include/sidevers.h                      "$OUT/lib/"
          cp target/${{ matrix.platform.target }}/release/libsidevers.a     "$OUT/lib/" 2>/dev/null || true
          cp target/${{ matrix.platform.target }}/release/libsidevers.so    "$OUT/lib/" 2>/dev/null || true
          cp target/${{ matrix.platform.target }}/release/libsidevers.dylib "$OUT/lib/" 2>/dev/null || true
          tar -czf "sidevers-cli-${{ matrix.platform.label }}.tar.gz" -C staging "${{ matrix.platform.label }}"
          shasum -a 256 "sidevers-cli-${{ matrix.platform.label }}.tar.gz" > "sidevers-cli-${{ matrix.platform.label }}.tar.gz.sha256"

      - name: Stage CLI artefacts (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          $out = "staging/${{ matrix.platform.label }}"
          New-Item -ItemType Directory -Force -Path "$out/bin","$out/lib" | Out-Null
          Copy-Item "target/${{ matrix.platform.target }}/release/sidevers.exe"      "$out/bin/"
          Copy-Item "target/${{ matrix.platform.target }}/release/sidevers-node.exe" "$out/bin/"
          Copy-Item "crates/sidevers-ffi/include/sidevers.h"                         "$out/lib/"
          Copy-Item "target/${{ matrix.platform.target }}/release/sidevers.dll"      "$out/lib/" -ErrorAction SilentlyContinue
          Copy-Item "target/${{ matrix.platform.target }}/release/libsidevers.a"     "$out/lib/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$out/*" -DestinationPath "sidevers-cli-${{ matrix.platform.label }}.zip"
          (Get-FileHash "sidevers-cli-${{ matrix.platform.label }}.zip" -Algorithm SHA256).Hash |
            Out-File "sidevers-cli-${{ matrix.platform.label }}.zip.sha256"

      - name: Upload CLI artefacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: sidevers-cli-${{ matrix.platform.label }}
          path: |
            sidevers-cli-${{ matrix.platform.label }}.tar.gz
            sidevers-cli-${{ matrix.platform.label }}.tar.gz.sha256
            sidevers-cli-${{ matrix.platform.label }}.zip
            sidevers-cli-${{ matrix.platform.label }}.zip.sha256
          if-no-files-found: ignore

      - name: Attach CLI artefacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            sidevers-cli-${{ matrix.platform.label }}.tar.gz
            sidevers-cli-${{ matrix.platform.label }}.tar.gz.sha256
            sidevers-cli-${{ matrix.platform.label }}.zip
            sidevers-cli-${{ matrix.platform.label }}.zip.sha256

  # ────────────────────────────────────────────────────────────────────
  # Desktop GUI — Tauri, signed, with latest.json
  # ────────────────────────────────────────────────────────────────────
  desktop:
    name: desktop (${{ matrix.platform.os }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: ubuntu-22.04,     args: '--bundles deb,appimage,rpm' }
          - { os: ubuntu-22.04-arm, args: '--bundles deb,appimage,rpm' }
          - { os: windows-latest,   args: '--bundles msi,nsis'         }
          - { os: macos-latest,     args: '--target universal-apple-darwin --bundles app,dmg' }

    runs-on: ${{ matrix.platform.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets (macOS universal)
        if: matrix.platform.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Linux Tauri dependencies
        if: startsWith(matrix.platform.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/tauri

      # tauri-action: builds the GUI, signs the bundles with the Ed25519
      # signing key, generates latest.json, and attaches everything to a
      # draft GitHub Release on tag push. Reads the keypair from these
      # secrets — see docs/RELEASING.md for the one-time setup.
      - name: Build + sign desktop GUI
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop/tauri
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: 'Sidevers ${{ github.ref_type == 'tag' && github.ref_name || 'manual build' }}'
          releaseBody: |
            Desktop, CLI, and node binaries for every supported platform.
            Desktop builds are signed with the protocol's Ed25519 release key;
            the in-app updater verifies signatures before applying.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          args: ${{ matrix.platform.args }}
          # Emits latest.json alongside the signed bundles; the updater
          # plugin in the client reads it from the "latest" release tag.
          includeUpdaterJson: true
