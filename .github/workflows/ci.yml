name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets

  # ---------------------------------------------------------------------------
  # Cross-platform validation: compile-check the library crates for every
  # mobile target Sidevers needs to support. The binary crates (sidevers-node
  # daemon, sidevers-cli) are desktop-only; mobile clients link the libraries
  # via FFI in Phase 3+. Compile-only, no test execution on mobile targets.
  # ---------------------------------------------------------------------------

  cross-compile-ios:
    name: cargo check (iOS ${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-ios
          - aarch64-apple-ios-sim
          - x86_64-apple-ios
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: cargo check (library crates only)
        run: |
          cargo check --target ${{ matrix.target }} \
            -p sidevers-core \
            -p sidevers-storage \
            -p sidevers-net \
            -p sidevers-conformance \
            -p sidevers-ffi

  cross-compile-android:
    name: cargo check (Android ${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-android
          - x86_64-linux-android
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: configure NDK linker
        run: |
          NDK_BIN="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          if [ "${{ matrix.target }}" = "aarch64-linux-android" ]; then
            LINKER="$NDK_BIN/aarch64-linux-android24-clang"
            echo "CC_aarch64_linux_android=$LINKER" >> $GITHUB_ENV
            echo "AR_aarch64_linux_android=$NDK_BIN/llvm-ar" >> $GITHUB_ENV
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$LINKER" >> $GITHUB_ENV
          else
            LINKER="$NDK_BIN/x86_64-linux-android24-clang"
            echo "CC_x86_64_linux_android=$LINKER" >> $GITHUB_ENV
            echo "AR_x86_64_linux_android=$NDK_BIN/llvm-ar" >> $GITHUB_ENV
            echo "CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER=$LINKER" >> $GITHUB_ENV
          fi
      - name: cargo check (library crates only)
        run: |
          cargo check --target ${{ matrix.target }} \
            -p sidevers-core \
            -p sidevers-storage \
            -p sidevers-net \
            -p sidevers-conformance \
            -p sidevers-ffi
